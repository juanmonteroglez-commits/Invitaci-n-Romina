<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invitación Saja Boys</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Great+Vibes&family=Montserrat:wght@400;600;800&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Cormorant Garamond', serif;
      background-color: #d7ccc0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .scene {
      perspective: 1200px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .envelope-container {
      position: relative;
      width: 320px;
      height: 440px;
      cursor: pointer;
      transform-style: preserve-3d;
      transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1), height 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .envelope-back {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #c9bcae;
      border-radius: 4px;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
    }

    /* --- TARJETA INTERIOR --- */
    .card {
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      bottom: 10px;
      background-color: #e3dac9;
      border: 2px solid #d4c4a8;
      border-radius: 10px;
      padding: 25px 20px;
      text-align: center;
      color: #5a4a42;
      opacity: 0;
      transform: scale(0.8) translateY(20px);
      transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1) 0.4s;
      z-index: 1;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .title {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.85rem;
      color: #bca07d;
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 10px;
      font-weight: 600;
    }

    .name {
      font-family: 'Great Vibes', cursive;
      font-size: 3.8rem;
      font-weight: normal;
      color: #8e44ad;
      margin-bottom: 5px;
      line-height: 1.1;
    }

    .age {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      font-style: italic;
      color: #5a4a42;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .theme {
      font-family: 'Montserrat', sans-serif;
      background-color: #f3ebdf;
      color: #8e44ad;
      padding: 8px 15px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 1px;
      display: inline-block;
      margin-bottom: 20px;
      border: 1px solid #d4c4a8;
    }

    .details {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem;
      line-height: 1.6;
      margin-bottom: 25px;
    }

    .details span {
      display: block;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #bca07d;
      font-weight: 800;
      margin-top: 15px;
      margin-bottom: 2px;
    }

    .cta-button {
      display: inline-block;
      margin-top: 10px;
      padding: 12px 20px;
      background: #bca07d;
      color: #fff;
      font-family: 'Montserrat', sans-serif;
      text-decoration: none;
      font-weight: 800;
      border-radius: 30px;
      text-transform: uppercase;
      font-size: 0.85rem;
      transition: background 0.3s;
      box-shadow: 0 4px 10px rgba(188, 160, 125, 0.3);
    }

    .cta-button:hover {
      background: #9e8464;
      transform: translateY(-2px);
    }

    /* --- SOLAPAS SVG --- */
    .flap {
      position: absolute;
      z-index: 5;
      transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.8s ease 0.2s;
    }

    .flap-top {
      top: 0;
      left: 0;
      transform-origin: top center;
    }

    .flap-bottom {
      bottom: 0;
      left: 0;
      transform-origin: bottom center;
    }

    .flap-left {
      top: 0;
      left: 0;
      transform-origin: left center;
    }

    .flap-right {
      top: 0;
      right: 0;
      transform-origin: right center;
    }

    /* --- SELLO DE CERA FOTORREALISTA CORREGIDO --- */
    .seal-wrapper {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(1);
      z-index: 10;
      width: 120px;
      /* Tamaño del sello ajustado */
      height: 120px;
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      animation: floatAndPulse 2.5s infinite ease-in-out;

      /* El contenedor se vuelve un círculo perfecto para que la sombra sea redonda */
      border-radius: 50%;
      filter: drop-shadow(0 6px 10px rgba(0, 0, 0, 0.35));
    }

    .seal-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;

      /* Recorta las esquinas de la foto JPG */
      border-radius: 100%;

      /* TRUCO CLAVE: Desaparece el blanco restante de los bordes irregulares */
      mix-blend-mode: multiply;
    }

    @keyframes floatAndPulse {
      0% {
        transform: translate(-50%, -50%) scale(1);
      }

      50% {
        transform: translate(-50%, -50%) scale(1.03);
      }

      100% {
        transform: translate(-50%, -50%) scale(1);
      }
    }

    /* --- ANIMACIÓN AL ABRIR --- */
    .envelope-container.open .flap-top {
      transform: rotateX(150deg);
      opacity: 0;
    }

    .envelope-container.open .flap-bottom {
      transform: rotateX(-150deg);
      opacity: 0;
    }

    .envelope-container.open .flap-left {
      transform: rotateY(-150deg);
      opacity: 0;
    }

    .envelope-container.open .flap-right {
      transform: rotateY(150deg);
      opacity: 0;
    }

    .envelope-container.open .seal-wrapper {
      opacity: 0;
      transform: translate(-50%, -50%) scale(0);
      pointer-events: none;
    }

    .envelope-container.open .card {
      opacity: 1;
      transform: scale(1) translateY(0);
      z-index: 20;
      pointer-events: auto;
    }

    /* --- EXPANSIÓN A PANTALLA COMPLETA --- */
    body.fullscreen .scene {
      width: 100vw;
      height: 100vh;
      transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body.fullscreen .envelope-container {
      width: 100vw;
      height: 100vh;
      cursor: default;
      transform-style: flat !important;
    }

    body.fullscreen .card {
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      border-radius: 0;
      border-width: 0;
      overflow-y: auto;
      display: block;
      /* Ajustamos ligeramente el padding para móviles y pantallas grandes */
      padding: 40px 20px;
    }

    body.fullscreen .envelope-back,
    body.fullscreen .flap,
    body.fullscreen .seal-wrapper {
      opacity: 0 !important;
      transition: opacity 0.4s ease !important;
      pointer-events: none;
    }

    /* --- CARRUSEL DOBLE INTERACTIVO --- */
    .carousel-section {
      width: calc(100% + 40px);
      max-width: none;
      margin: 20px -20px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 10px;
      /* Máscara de desvanecimiento suave en los extremos */
      -webkit-mask-image: linear-gradient(to right, transparent, rgba(0, 0, 0, 1) 8%, rgba(0, 0, 0, 1) 92%, transparent);
      mask-image: linear-gradient(to right, transparent, rgba(0, 0, 0, 1) 8%, rgba(0, 0, 0, 1) 92%, transparent);
    }

    .carousel-row {
      display: flex;
      width: 100%;
      overflow: hidden;
      position: relative;
      touch-action: none;
      cursor: grab;
      user-select: none;
    }

    .carousel-row.is-dragging {
      cursor: grabbing;
    }

    .carousel-track {
      display: flex;
      width: max-content;
      will-change: transform;
      flex-shrink: 0;
      transform: translate3d(0, 0, 0);
      transition: transform 0.2s ease-out;
    }

    .carousel-item {
      width: 150px;
      height: 150px;
      flex-shrink: 0;
      margin-right: 24px;
      /* Espacio horizontal proporcional al nuevo tamaño */
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      cursor: pointer;
    }

    .carousel-item img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      mix-blend-mode: multiply;
      /* Elimina el fondo blanco para integrar la acuarela en la tarjeta */
      transition: transform 0.4s ease;
    }

    .carousel-item:hover {
      transform: scale(1.15);
    }

    .carousel-item:hover img {
      transform: rotate(4deg);
    }

    /* Animaciones CSS fluidas para desplazamiento infinito */
    @keyframes scroll-left {
      0% {
        transform: translateX(0);
      }

      100% {
        transform: translateX(-50%);
      }
    }

    @keyframes scroll-right {
      0% {
        transform: translateX(-50%);
      }

      100% {
        transform: translateX(0);
      }
    }
  </style>
</head>

    function abrirSobre(elemento) {
      if (!elemento.classList.contains('open')) {
        elemento.classList.add('open');
        setTimeout(() => {
          document.body.classList.add('fullscreen');
        }, 1200);
      }
    }

    function initCarouselRows() {
      const rows = document.querySelectorAll('.carousel-row');

      rows.forEach((row) => {
        const track = row.querySelector('.carousel-track');
        if (!track) return;

        const state = row.__carouselState || {};
        state.offset = 0;
        state.dragging = false;
        state.startX = 0;
        state.startOffset = 0;
        state.minOffset = 0;
        state.maxOffset = 0;
        state.speed = row.classList.contains('row-left') ? 18 : 16;
        state.lastTime = performance.now();
        state.rafId = null;
        row.__carouselState = state;

        const updateTrack = () => {
          track.style.transform = `translate3d(${state.offset}px, 0, 0)`;
        };

        const updateBounds = () => {
          state.maxOffset = 0;
          state.minOffset = row.clientWidth - track.scrollWidth;
          if (state.minOffset > 0) {
            state.minOffset = 0;
          }
          state.offset = Math.max(state.minOffset, Math.min(state.maxOffset, state.offset));
          updateTrack();
        };

        const clampOffset = (value) => Math.max(state.minOffset, Math.min(state.maxOffset, value));

        const stopAutoScroll = () => {
          if (state.rafId) {
            cancelAnimationFrame(state.rafId);
            state.rafId = null;
          }
        };

        const startAutoScroll = () => {
          stopAutoScroll();
          state.lastTime = performance.now();
          const tick = (now) => {
            if (!state.dragging) {
              const delta = (now - state.lastTime) / 1000;
              state.offset -= state.speed * delta;

              if (state.offset <= state.minOffset) {
                state.offset = state.maxOffset;
              }

              updateTrack();
            }

            state.lastTime = now;
            state.rafId = requestAnimationFrame(tick);
          };

          state.rafId = requestAnimationFrame(tick);
        };

        row.addEventListener('pointerdown', (event) => {
          if (event.pointerType === 'mouse' && event.button !== 0) return;
          state.dragging = true;
          state.startX = event.clientX;
          state.startOffset = state.offset;
          row.classList.add('is-dragging');
          stopAutoScroll();
          row.setPointerCapture(event.pointerId);
          event.preventDefault();
        });

        row.addEventListener('pointermove', (event) => {
          if (!state.dragging) return;
          const deltaX = event.clientX - state.startX;
          state.offset = clampOffset(state.startOffset + deltaX);
          updateTrack();
          event.preventDefault();
        });

        const endDrag = (event) => {
          if (!state.dragging) return;
          state.dragging = false;
          row.classList.remove('is-dragging');
          state.offset = clampOffset(state.offset);
          state.startOffset = state.offset;
          startAutoScroll();
          if (event?.pointerId != null) {
            try {
              row.releasePointerCapture(event.pointerId);
            } catch (error) {
              // Ignorar si el pointer ya no está capturado
            }
          }
        };

        row.addEventListener('pointerup', endDrag);
        row.addEventListener('pointercancel', endDrag);
        row.addEventListener('pointerleave', (event) => {
          if (state.dragging && event.buttons === 0) {
            endDrag(event);
          }
        });

        updateBounds();
        startAutoScroll();
      });
    }

    window.addEventListener('load', initCarouselRows);
    window.addEventListener('resize', initCarouselRows);
  </script>
</body>
